<head>

    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding-top: 20px; }
        canvas { border: 5px solid #2d3436; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #status-box { margin: 15px; padding: 10px; font-weight: bold; }
        .loading { color: #e67e22; }
        .ready { color: #27ae60; }
        #history { width: 320px; margin: 20px auto; background: white; padding: 15px; border-radius: 10px; height: 200px; overflow-y: auto; text-align: left; border: 1px solid #ddd; }
        .log-item { border-bottom: 1px solid #eee; padding: 5px 0; display: flex; justify-content: space-between; }
    </style>

<body>
    <h2>🚀 AI 실시간 그림 추측기</h2>
    <div id="status-box" class="loading">상태: 라이브러리 및 모델 불러오는 중...</div>
    
    <div id="canvas-container"></div>
    <button onclick="resetCanvas()" style="margin-top:15px; padding: 10px 25px; cursor: pointer; border-radius: 5px; border: none; background: #2d3436; color: white;">그림 지우기</button>

    <div id="history">
        <strong>예측 기록:</strong>
        <div id="log-list"></div>
    </div>

        function setup() {
            canvas = createCanvas(300, 300);
            canvas.parent('canvas-container');
            background(255);

    
            classifier = ml5.imageClassifier('DoodleNet', () => {
                isReady = true;
                document.getElementById('status-box').innerText = "상태: ✅ 준비 완료!";
                document.getElementById('status-box').className = "ready";
                setInterval(classifyDrawing, 2000);
            });
        }
        
        function draw() {
            if (mouseIsPressed) {
                strokeWeight(12);
                stroke(0);
                line(pmouseX, pmouseY, mouseX, mouseY);
            }
        }
        
        function resetCanvas() {
            background(255);
        }
        
        function classifyDrawing() {
            if (!isReady) return;
            classifier.classify(canvas, (err, results) => {
                if (err) return;
                if (results && results.length > 0) {
                    // 결과가 있을 때 로그 추가 함수 실행
                    addLog(results[0].label, results[0].confidence);
                }
            });
        }
        
        function addLog(label, conf) {
            const list = document.getElementById('log-list');
            const item = document.createElement('div');
            item.className = 'log-item';
            
            // 1. 영어 이름을 한글로 변환 (목록에 없으면 영어 그대로)
            const koreanLabel = labelMap[label] || label;
            // 2. 확률 계산
            const percentage = (conf * 100).toFixed(1);
            
            item.innerHTML = `<span>🏷️ <b>${koreanLabel}</b></span> <span>${percentage}%</span>`;
            list.prepend(item);
        }
    </script>
</body>
</html>
