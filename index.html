<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>AI 실시간 낙서 인식기 - 과학 행사용</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; background: #f4f4f9; padding-top: 10px; margin: 0; overflow-x: hidden; }
        
        /* 상단 바 설정 */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 600px; margin: 0 auto; }
        #timer { font-size: 24px; font-weight: bold; color: #d63031; }
        #reset-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #2d3436; color: white; transition: 0.2s; }
        #reset-btn:active { transform: scale(0.95); }

        /* 캔버스 설정 */
        #canvas-container { display: flex; justify-content: center; margin-top: 10px; }
        canvas { 
            border: 5px solid #2d3436; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            touch-action: none; /* 모바일 스크롤 방지 핵심 */
        }

        #status-box { margin: 10px; font-size: 14px; font-weight: bold; }
        .loading { color: #e67e22; }
        .ready { color: #27ae60; }

        /* 로그 기록 설정 */
        #history { width: 90%; max-width: 400px; margin: 20px auto; background: white; padding: 15px; border-radius: 15px; height: 180px; overflow-y: auto; text-align: left; border: 1px solid #ddd; }
        
        /* 로그 아이템 기본: 회색 */
        .log-item { 
            border-bottom: 1px solid #eee; 
            padding: 8px 0; 
            display: flex; 
            justify-content: space-between; 
            color: #b2bec3; 
            transition: color 0.3s ease;
        }
        
        /* 가장 최근 로그만 검정색 강조 */
        #log-list .log-item:first-child { 
            color: #2d3436; 
            font-weight: bold; 
            border-left: 4px solid #2d3436;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div id="timer">시간: 30</div>
        <button id="reset-btn" onclick="resetGame()">새 게임 (리셋)</button>
    </div>

    <h2>🚀 AI 실시간 그림 추측기</h2>
    <div id="status-box" class="loading">상태: 모델 불러오는 중...</div>
    
    <div id="canvas-container"></div>

    <div id="history">
        <strong>실시간 예측 기록:</strong>
        <div id="log-list"></div>
    </div>

    <script>

        let canvas;
        let isReady = false;
        
        // 타이머 관련 변수
        let timeLeft = 30;
        let timerRunning = false;
        let timerInterval;
        let hasDrawn = false; // 첫 그림 시작 여부 체크

":"침낭","smiley_face":"웃는 얼굴","snail":"달팽이","snake":"뱀","snorkel":"스노클","snowflake":"눈송이","snowman":"눈사람","soccer_ball":"축구공","sock":"양말","speedboat":"쾌속정","spider":"거미","spoon":"숟가락","spreadsheet":"스프레드시트","square":"정사각형","squiggle":"구불구불한 선","squirrel":"다람쥐","stairs":"계단","star":"별","steak":"스테이크","stereo":"스테레오","stethoscope":"청진기","stitches":"바늘땀","stop_sign":"정지 표지판","stove":"가스레인지","strawberry":"딸기","streetlight":"가로등","submarine":"잠수함","suitcase":"여행 가방","sun":"태양","swan":"백조","sweater":"스웨터","swingset":"그네","sword":"칼","syringe":"주사기","table":"탁자","teapot":"찻주전자","teddy-bear":"곰인형","telephone":"전화기","television":"텔레비전","tennis_racquet":"테니스 라켓","tent":"텐트","the_mona_lisa":"모나리자","tiger":"호집이","toaster":"토스터","toe":"발가락","toilet":"변기","tooth":"치아","toothbrush":"칫솔","toothpaste":"치약","tornado":"토네이도","tractor":"트랙터","traffic_light":"신호등","train":"기차","tree":"나무","triangle":"삼각형","trombone":"트롬본","truck":"트럭","trumpet":"트럼펫","t-shirt":"티셔츠","turtle":"거북이","underwear":"속옷","unicorn":"유니콘","unicycle":"외발자전거","vase":"꽃병","violin":"바이올린","washing_machine":"세탁기","watermelon":"수박","waterslide":"워터슬라이드","whale":"고래","wheel":"바퀴","windmill":"풍차","wine_bottle":"와인병","wine_glass":"와인잔","wristwatch":"손목시계","wrist":"손목","zebra":"얼룩말","zigzag":"지그재그"};

        function setup() {
            // 캔버스 크기를 300에서 350으로 확대
            canvas = createCanvas(350, 350);
            canvas.parent('canvas-container');
            background(255);

            classifier = ml5.imageClassifier('DoodleNet', () => {
                isReady = true;
                document.getElementById('status-box').innerText = "상태: ✅ 준비 완료!";
                document.getElementById('status-box').className = "ready";
                // 1. 예측 업데이트 시간을 1초(1000ms)로 수정
                setInterval(classifyDrawing, 1000);
            });
        }

        function draw() {
            if (mouseIsPressed) {
                // 그림을 그리기 시작하면 타이머 시작
                if (!hasDrawn && isReady) {
                    startTimer();
                    hasDrawn = true;
                }
                
                strokeWeight(12);
                stroke(0);
                line(pmouseX, pmouseY, mouseX, mouseY);
            }
        }

        // 타이머 시작 함수
        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `시간: ${timeLeft}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerRunning = false;
                    alert("시간 종료!");
                }
            }, 1000);
        }

        // 게임 리셋 함수
        function resetGame() {
            background(255);
            document.getElementById('log-list').innerHTML = ""; // 로그 초기화
            
            // 타이머 초기화
            clearInterval(timerInterval);
            timeLeft = 30;
            timerRunning = false;
            hasDrawn = false;
            document.getElementById('timer').innerText = `시간: ${timeLeft}`;
        }

        function classifyDrawing() {
            if (!isReady || !hasDrawn || timeLeft <= 0) return;
            
            classifier.classify(canvas, (err, results) => {
                if (err) return;
                if (results && results.length > 0) {
                    addLog(results[0].label, results[0].confidence);
                }
            });
        }

        function addLog(label, conf) {
            const list = document.getElementById('log-list');
            const item = document.createElement('div');
            item.className = 'log-item';
            
            const koreanLabel = labelMap[label] || label;
            const percentage = (conf * 100).toFixed(1);
            
            item.innerHTML = `<span>🏷️ <b>${koreanLabel}</b></span> <span>${percentage}%</span>`;
            
            // 리스트 맨 위에 추가 (CSS에 의해 첫 번째 자식만 검정색으로 보임)
            list.prepend(item);
            
            // 로그가 너무 많아지면 아래쪽 삭제 (성능 관리)
            if (list.children.length > 30) {
                list.removeChild(list.lastChild);
            }
        }
    </script>
</body>
</html>
